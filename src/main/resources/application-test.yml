spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/minitalk_test
    username: minitalk
    password: ${DB_PASSWORD:testpass}
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    mongodb:
      uri: mongodb://localhost:27017/minitalk_test
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:testpass}
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:test-only-secret-key-not-for-production-min-32chars}
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000

logging:
  level:
    com.minitalk: DEBUG
